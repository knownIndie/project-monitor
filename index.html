<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A live index of Aryan's projects, experiments, and working notes." />
    <title>Project Monitor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2212%22 fill=%22%23181814%22/><circle cx=%2232%22 cy=%2232%22 r=%2210%22 fill=%22%23d84d2f%22/></svg>" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header class="hero">
        <div class="hero-topline">
          <p class="eyebrow">PROJECT MONITOR</p>
          <nav class="social-links" aria-label="Social profiles">
            <a href="https://github.com/knownIndie" target="_blank" rel="noreferrer" aria-label="GitHub profile" title="GitHub">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.86c-2.78.6-3.37-1.18-3.37-1.18-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.9 1.53 2.35 1.09 2.92.83.09-.65.35-1.09.64-1.34-2.22-.25-4.56-1.11-4.56-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.6 9.6 0 0 1 12 6.84a9.6 9.6 0 0 1 2.5.34c1.91-1.3 2.75-1.03 2.75-1.03.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.76c0 .27.18.58.69.48A10 10 0 0 0 12 2Z" />
              </svg>
              <span class="visually-hidden">GitHub</span>
            </a>
            <a href="https://www.linkedin.com/in/aryan-bhardwaj-56129422b/" target="_blank" rel="noreferrer" aria-label="LinkedIn profile" title="LinkedIn">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6.5 8.25H3.25V21H6.5V8.25ZM4.88 2A1.88 1.88 0 1 0 4.88 5.75 1.88 1.88 0 0 0 4.88 2ZM21 13.7c0-3.84-2.05-5.63-4.78-5.63a4.13 4.13 0 0 0-3.72 2.05V8.25H9.25V21h3.25v-6.31c0-1.66.31-3.27 2.37-3.27 2.03 0 2.06 1.9 2.06 3.38V21H21v-7.3Z" />
              </svg>
              <span class="visually-hidden">LinkedIn</span>
            </a>
            <a href="https://x.com/bhardwaj03aryan" target="_blank" rel="noreferrer" aria-label="X profile" title="X">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18.24 2.25h3.31l-7.23 8.26L22.83 21h-6.66l-5.21-6.82L4.99 21H1.68l7.73-8.84L1.25 2.25h6.83l4.71 6.23 5.45-6.23Zm-1.16 16.9h1.83L7.08 4H5.12l11.96 15.15Z" />
              </svg>
              <span class="visually-hidden">X</span>
            </a>
          </nav>
        </div>
        <h1>Work, not claims.</h1>
        <p class="intro">A running record of what I am building, what is complete, and what changed recently.</p>
      </header>

      <section aria-labelledby="projects-heading">
        <div class="section-heading">
          <h2 id="projects-heading">Projects</h2>
          <nav class="filters" aria-label="Filter projects">
            <button class="filter is-active" type="button" data-filter="all">All</button>
            <button class="filter" type="button" data-filter="active">Active</button>
            <button class="filter" type="button" data-filter="inactive">Inactive</button>
            <button class="filter" type="button" data-filter="complete">Complete</button>
            <button class="filter" type="button" data-filter="archived">Archived</button>
          </nav>
        </div>
        <div id="project-grid" class="project-grid" aria-live="polite"></div>
        <p id="empty-state" class="empty-state" hidden>No projects match this filter.</p>
      </section>
    </main>

    <template id="project-card-template">
      <article class="project-card">
        <div class="card-topline">
          <span class="status"></span>
          <time></time>
        </div>
        <h3></h3>
        <p class="description"></p>
        <div class="card-links">
          <a class="open-project">Open project <span aria-hidden="true">↗</span></a>
          <a class="source-link" target="_blank" rel="noreferrer">Source</a>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
